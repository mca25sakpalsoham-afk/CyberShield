{% extends "base.html" %}
{% block title %}Login | CyberShield{% endblock %}
{% block content %}
<div class="auth-stage">
    <div class="auth-panel glass-card">
        <div class="brand auth-brand"><span class="brand-mark">CS</span><span>CyberShield</span></div>
        <h2>Security training command center</h2>
        <p class="muted">Sign in to continue your labs, simulations, CTFs, and reports.</p>
        <form method="post" class="stacked-form">
            <label>Email<input name="email" type="email" required placeholder="you@example.com"></label>
            <label>Password<input name="password" type="password" required placeholder="Your password"></label>
            <button class="btn-cyber" type="submit"><i data-lucide="log-in"></i> Login</button>
        </form>
        <p class="auth-switch">New analyst? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
    </div>
</div>
{% endblock %}
